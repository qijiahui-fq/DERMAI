<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?bundle",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "recharts": "https://esm.sh/recharts@2.13.3"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { HashRouter, Routes, Route, Link } from 'react-router-dom';

        const PageLoader = ({ name }) => {
            const [Comp, setComp] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                // 直接指向你的嵌套目录
                fetch(`./pages/pages/${name}.jsx`)
                    .then(res => {
                        if (!res.ok) throw new Error('文件未找到');
                        return res.text();
                    })
                    .then(code => {
                        // 预处理：删掉业务代码里的 import 语句，因为我们会手动注入依赖
                        const cleanCode = code.replace(/import[\s\S]*?from\s+['"].*?['"];?/g, '');
                        
                        const result = Babel.transform(cleanCode, { 
                            presets: ['react', 'typescript'] 
                        }).code;

                        const exports = {};
                        const module = { exports };
                        // 注入环境，确保 TargetID.jsx 里的算法能跑通
                        const fn = new Function('React', 'useState', 'useEffect', 'exports', 'module', result);
                        fn(React, useState, useEffect, exports, module);

                        setComp(() => module.exports.default || module.exports);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(`模型加载失败: ${err.message}`);
                    });
            }, [name]);

            if (error) return <div className="p-20 text-red-500 text-center font-mono">{error}</div>;
            return Comp ? <Comp /> : (
                <div className="flex flex-col h-screen items-center justify-center bg-slate-50">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-indigo-600 font-bold tracking-widest animate-pulse">DERMAI 算法引擎初始化...</p>
                </div>
            );
        };

        const App = () => (
            <HashRouter>
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-900">
                    <nav className="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center text-white font-bold shadow-lg">D</div>
                            <span className="text-xl font-black tracking-tight">DermAI</span>
                        </div>
                        <div className="flex gap-8 text-xs font-bold uppercase tracking-widest">
                            <Link to="/" className="text-slate-400 hover:text-indigo-600 transition-all">药研中心</Link>
                            <Link to="/target-id" className="text-slate-400 hover:text-indigo-600 transition-all">靶点识别</Link>
                        </div>
                    </nav>
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<PageLoader name="Dashboard" />} />
                            <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                            <Route path="*" element={<PageLoader name="Dashboard" />} />
                        </Routes>
                    </main>
                </div>
            </HashRouter>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
