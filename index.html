<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "react-router-dom": "https://esm.sh/react-router-dom@6.28.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { HashRouter, Routes, Route, Link } = ReactRouterDom;

        // 🚀 核心适配：直接指向你的 pages/pages/ 路径
        const PageLoader = ({ name }) => {
            const [Comp, setComp] = useState(null);
            const [loadError, setLoadError] = useState(null);

            useEffect(() => {
                // 这里的路径必须和你 GitHub 上的嵌套结构完全一致
                const targetPath = `./pages/pages/${name}.jsx`;
                
                fetch(targetPath)
                    .then(res => {
                        if (!res.ok) throw new Error(`无法加载文件: ${targetPath}`);
                        return res.text();
                    })
                    .then(code => {
                        // 使用 Babel 现场编译抓取的 JSX 代码
                        const result = Babel.transform(code, { 
                            presets: ['react', 'typescript'] 
                        }).code;
                        
                        const exports = {};
                        const module = { exports };
                        // 注入全局变量，确保你的 TargetID 逻辑能跑通
                        const fn = new Function('React', 'exports', 'module', 'lucideReact', 'recharts', 'axios', result);
                        fn(React, exports, module, lucideReact, recharts, axios);
                        
                        setComp(() => module.exports.default || module.exports);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoadError(err.message);
                    });
            }, [name]);

            if (loadError) return <div className="p-20 text-red-500 text-center font-bold">路径匹配失败: {loadError}</div>;
            return Comp ? <Comp /> : <div className="p-20 text-center text-indigo-500 font-bold animate-pulse">DermAI 正在同步皮科药研模型...</div>;
        };

        const Navbar = () => (
            <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 flex justify-between h-16 items-center shadow-sm">
                <Link to="/" className="flex items-center gap-2 group">
                    <div className="p-2 bg-indigo-600 rounded-lg text-white shadow-md">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.673.337a4 4 0 01-2.5.5L6.336 15.5a2 2 0 01-1.92-1.277L3 10l3 3 3-3 3 3 3-3 3 3z"></path></svg>
                    </div>
                    <span className="text-xl font-black text-slate-800 tracking-tighter">DermAI</span>
                </Link>
                <div className="flex gap-4 text-sm font-bold">
                    <Link to="/" className="text-slate-500 hover:text-indigo-600 transition-colors">药研中心</Link>
                    <Link to="/target-id" className="text-slate-500 hover:text-indigo-600 transition-colors">靶点识别</Link>
                </div>
            </nav>
        );

        const App = () => (
            <HashRouter>
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <Navbar />
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<PageLoader name="Dashboard" />} />
                            <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                            <Route path="*" element={<PageLoader name="Dashboard" />} />
                        </Routes>
                    </main>
                    <footer className="bg-white border-t border-slate-100 py-4 text-center">
                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">© 2026 DermAI Data Empowerment Department</p>
                    </footer>
                </div>
            </HashRouter>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
