<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?bundle",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9"
      }
    }
    </script>
</head>
<body class="bg-slate-50">
    <div id="dermai-app-container"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { HashRouter, Routes, Route, Link } from 'react-router-dom';
        import * as LucideIcons from 'lucide-react';
        import * as Recharts from 'recharts';
        import axios from 'axios';

        // 🚀 核心修改 2：强行清理可能存在的旧 React 全局变量
        window.React = React;
        
        const PageLoader = ({ name }) => {
            const [Comp, setComp] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                // 🚀 核心修改 3：加上随机参数防止缓存
                fetch(`./pages/${name}.jsx?t=${Date.now()}`)
                    .then(res => {
                        if (!res.ok) throw new Error(`无法载入: pages/${name}.jsx`);
                        return res.text();
                    })
                    .then(code => {
                        const cleanCode = code.replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '// import removed');
                        const result = Babel.transform(cleanCode, { presets: ['react', 'typescript'] }).code;
                        const exports = {};
                        const module = { exports };
                        
                        const fn = new Function(
                            'React', 'useState', 'useEffect', 'exports', 'module', 
                            'LucideIcons', 'Recharts', 'axios', 'Link',
                            result
                        );
                        
                        fn(React, useState, useEffect, exports, module, LucideIcons, Recharts, axios, Link);
                        setComp(() => module.exports.default || module.exports);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                    });
            }, [name]);

            if (error) return <div className="p-20 text-red-500 text-center font-bold">系统同步异常: {error}</div>;

            return Comp ? <Comp /> : (
                <div className="flex h-[80vh] items-center justify-center">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-indigo-600 font-black animate-pulse uppercase tracking-widest text-xs">DERMAI 加载业务逻辑中...</p>
                    </div>
                </div>
            );
        };

        const App = () => (
            <HashRouter>
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b px-8 py-5 flex justify-between items-center shadow-sm sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">D</div>
                            <span className="text-2xl font-black text-slate-800 tracking-tighter">DermAI</span>
                        </div>
                        <div className="flex gap-10 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
                            <Link to="/" className="hover:text-indigo-600 transition-colors">药研中心</Link>
                            <Link to="/target-id" className="hover:text-indigo-600 transition-colors">靶点识别</Link>
                        </div>
                    </nav>
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<PageLoader name="Dashboard" />} />
                            <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                        </Routes>
                    </main>
                    <footer className="py-8 text-center text-slate-300 text-[10px] font-bold tracking-[0.3em]">
                        © 2026 DATA EMPOWERMENT DEPT.
                    </footer>
                </div>
            </HashRouter>
        );

        // 🚀 对应修改 1 的挂载点
        const rootElement = document.getElementById('dermai-app-container');
        if (rootElement) {
           ReactDOM.createRoot(rootElement).render(
<App />
);
        }
    </script>
</body>
</html>
