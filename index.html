<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react-router-dom@6.3.0/dist/umd/react-router-dom.production.min.js"></script>
    
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 强制等待 React 全局变量可用
        const initDermAI = () => {
            const { useState, useEffect } = React;
            const { HashRouter, Routes, Route, Link } = ReactRouterDom;

            const PageLoader = ({ name }) => {
                const [Comp, setComp] = useState(null);
                useEffect(() => {
                    // 适配你现在的 pages/pages/ 路径
                    fetch(`./pages/pages/${name}.jsx`)
                        .then(res => res.text())
                        .then(code => {
                            const result = Babel.transform(code, { 
                                presets: ['react'] 
                            }).code;
                            const exports = {};
                            const module = { exports };
                            // 注入环境
                            new Function('React', 'exports', 'module', 'lucideReact', 'recharts', 'axios', result)
                                (React, exports, module, window.lucideReact || {}, window.recharts || {}, window.axios || {});
                            setComp(() => module.exports.default || module.exports);
                        })
                        .catch(err => console.error("加载失败:", err));
                }, [name]);

                return Comp ? <Comp /> : <div className="p-20 text-center text-indigo-500 font-bold animate-pulse">DermAI 正在同步皮科药研模型...</div>;
            };

            const App = () => (
                <HashRouter>
                    <div className="min-h-screen bg-slate-50 flex flex-col">
                        <nav className="bg-white border-b p-4 flex justify-between items-center shadow-sm">
                            <Link to="/" className="text-2xl font-black text-indigo-600">DermAI</Link>
                            <div className="flex gap-6 font-bold text-sm text-slate-500">
                                <Link to="/" className="hover:text-indigo-600">药研中心</Link>
                                <Link to="/target-id" className="hover:text-indigo-600">靶点识别</Link>
                            </div>
                        </nav>
                        <main className="flex-1">
                            <Routes>
                                <Route path="/" element={<PageLoader name="Dashboard" />} />
                                <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                                <Route path="*" element={<PageLoader name="Dashboard" />} />
                            </Routes>
                        </main>
                    </div>
                </HashRouter>
            );

            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        };

        // 确保 React 加载完再执行
        if (window.React && window.ReactDOM) {
            initDermAI();
        } else {
            window.onload = initDermAI;
        }
    </script>
</body>
</html>
