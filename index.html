<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "react-router-dom": "https://esm.sh/react-router-dom@6.28.0",
        "recharts": "https://esm.sh/recharts@2.13.3",
        "axios": "https://esm.sh/axios@1.7.9"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,typescript">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import { HashRouter, Routes, Route } from 'react-router-dom';

        // 引入你的页面（只要这些文件在 pages/ 目录下且后缀是 .jsx）
        // 如果这里还报 MIME 错误，Babel 会尝试通过 fetch 抓取并就地翻译
        import Dashboard from './pages/Dashboard.jsx';
        import TargetID from './pages/TargetID.jsx';
        import KnowledgeGraph from './pages/KnowledgeGraph.jsx';

        const App = () => (
            <HashRouter>
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<Dashboard />} />
                            <Route path="/target-id" element={<TargetID />} />
                            <Route path="/knowledge-graph" element={<KnowledgeGraph />} />
                            <Route path="*" element={<Dashboard />} />
                        </Routes>
                    </main>
                </div>
            </HashRouter>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
