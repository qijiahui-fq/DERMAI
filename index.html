<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI 皮肤药研平台</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?bundle",
        "lucide-react": "https://esm.sh/lucide-react@0.462.0",
        "recharts": "https://esm.sh/recharts@2.13.3"
      }
    }
    </script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { HashRouter, Routes, Route, Link } from 'react-router-dom';

        // 统一注入环境，防止业务组件内部重复 import 导致 useRef 报错
        window.React = React;

        const PageLoader = ({ name }) => {
            const [Comp, setComp] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                fetch(`./pages/pages/${name}.jsx`)
                    .then(res => {
                        if (!res.ok) throw new Error(`文件未找到: ${name}`);
                        return res.text();
                    })
                    .then(code => {
                        // 🚀 这里的黑科技：强行把业务代码里的所有 import 换成注释
                        // 确保它们只使用我们在这里提供的 React 实例
                        const cleanCode = code.replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '// import removed');
                        
                        const result = Babel.transform(cleanCode, { 
                            presets: ['react', 'typescript'] 
                        }).code;

                        const exports = {};
                        const module = { exports };
                        // 注入全局 React，确保 useRef 正常工作
                        const fn = new Function('React', 'useState', 'useEffect', 'exports', 'module', result);
                        fn(React, useState, useEffect, exports, module);

                        setComp(() => module.exports.default || module.exports);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                    });
            }, [name]);

            if (error) return <div className="p-20 text-red-500 text-center font-mono">加载失败: {error}</div>;
            return Comp ? <Comp /> : (
                <div className="flex flex-col h-[60vh] items-center justify-center">
                    <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-4 text-indigo-600 font-bold animate-pulse">DERMAI 模型同步中...</p>
                </div>
            );
        };

        const App = () => (
            <HashRouter>
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center text-white font-bold">D</div>
                            <span className="text-xl font-black text-slate-800 tracking-tight">DermAI</span>
                        </div>
                        <div className="flex gap-8 text-xs font-bold uppercase tracking-widest text-slate-500">
                            <Link to="/" className="hover:text-indigo-600">药研中心</Link>
                            <Link to="/target-id" className="hover:text-indigo-600">靶点识别</Link>
                        </div>
                    </nav>
                    <main className="flex-1">
                        <Routes>
                            <Route path="/" element={<PageLoader name="Dashboard" />} />
                            <Route path="/target-id" element={<PageLoader name="TargetID" />} />
                            <Route path="*" element={<PageLoader name="Dashboard" />} />
                        </Routes>
                    </main>
                    <footer className="p-6 text-center text-slate-300 text-[10px] font-bold tracking-[0.2em]">
                        © 2026 DATA EMPOWERMENT DEPT.
                    </footer>
                </div>
            </HashRouter>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
